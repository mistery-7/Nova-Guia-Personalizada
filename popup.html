<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurar Nova Guia</title>
    <style>
        body { width: 400px; font-family: Arial, sans-serif; text-align: center; }
        input { width: 90%; margin: 10px 10px; padding: 5px; }
        button { width: 100px; margin: 5px; padding: 5px; cursor: pointer; }
        #save { background-color: rgb(0, 0, 174); color: white; border: none; }
        #close { background-color: red; color: white; border: none; }
        .footer { margin-top: 10px; font-size: 12px; color: gray; font-style: italic; }
    </style>
</head>
<body>
    <h3>NOVA GUIA PERSONALIZADA</h3>
    <input type="text" id="url" placeholder="Digite a URL">
    <br>
    <button id="save">OK</button>
    <button id="close">FECHAR</button>
    <p class="footer">Feito por Pablo Almeida</p>
    <script src="popup.js"></script>

</body>
</html>
